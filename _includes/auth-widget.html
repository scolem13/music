<!-- Auth: injects sign-in controls into the navbar right side via JS.
     No visible strip — auth lives in a navbar dropdown instead. -->
<script>
function _authEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function authSignIn() {
  const email = (document.getElementById('auth-email') || {}).value || '';
  const pass  = (document.getElementById('auth-pass')  || {}).value || '';
  const { error } = await window.sb.auth.signInWithPassword({ email, password: pass });
  if (error) alert(error.message); else location.reload();
}
async function authSignUp() {
  const email = (document.getElementById('auth-email') || {}).value || '';
  const pass  = (document.getElementById('auth-pass')  || {}).value || '';
  const { error } = await window.sb.auth.signUp({ email, password: pass });
  alert(error ? error.message : 'Account created — now sign in.');
}
async function authGoogle() {
  await window.sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}
async function authSignOut() {
  await window.sb.auth.signOut();
  location.reload();
}

document.addEventListener('DOMContentLoaded', async function () {
  let session = null;
  try {
    const { data } = await window.sb.auth.getSession();
    session = data.session;
  } catch (e) {}

  // Find the navbar collapse container and append a right-side auth nav list
  const collapse = document.getElementById('navbarCollapse')
    || document.querySelector('.navbar-collapse');
  if (!collapse) return;

  const ul = document.createElement('ul');
  ul.className = 'navbar-nav ms-auto';
  ul.id = 'navbar-auth';

  if (session) {
    const u = session.user;
    const name = (u.user_metadata && u.user_metadata.full_name)
      ? u.user_metadata.full_name.split(' ')[0]
      : u.email.split('@')[0];
    ul.innerHTML =
      '<li class="nav-item dropdown">' +
        '<a class="nav-link dropdown-toggle" href="#" role="button"' +
        '   data-bs-toggle="dropdown" aria-expanded="false">' +
          _authEsc(name) +
        '</a>' +
        '<ul class="dropdown-menu dropdown-menu-end">' +
          '<li><span class="dropdown-item-text auth-email-label">' +
            _authEsc(u.email) +
          '</span></li>' +
          '<li><hr class="dropdown-divider"></li>' +
          '<li><button class="dropdown-item" onclick="authSignOut()">Sign out</button></li>' +
        '</ul>' +
      '</li>';
  } else {
    ul.innerHTML =
      '<li class="nav-item dropdown" id="auth-signin-item">' +
        '<a class="nav-link dropdown-toggle" href="#" role="button"' +
        '   data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">' +
          'Sign in' +
        '</a>' +
        '<ul class="dropdown-menu dropdown-menu-end auth-signin-menu">' +
          '<li>' +
            '<input id="auth-email" type="email" class="form-control form-control-sm mb-2"' +
            '       placeholder="Email"' +
            '       onkeydown="if(event.key===\'Enter\')document.getElementById(\'auth-pass\').focus()">' +
            '<input id="auth-pass" type="password" class="form-control form-control-sm mb-2"' +
            '       placeholder="Password"' +
            '       onkeydown="if(event.key===\'Enter\')authSignIn()">' +
            '<button class="btn btn-primary btn-sm w-100 mb-2" onclick="authSignIn()">Sign in</button>' +
            '<button class="btn btn-outline-secondary btn-sm w-100 mb-2" onclick="authSignUp()">Create account</button>' +
            '<hr class="my-1">' +
            '<button class="btn btn-outline-secondary btn-sm w-100" onclick="authGoogle()">Sign in with Google</button>' +
          '</li>' +
        '</ul>' +
      '</li>';
  }

  collapse.appendChild(ul);
});
</script>
