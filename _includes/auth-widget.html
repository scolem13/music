<!-- Injected at the top of <body> on every page. Sign in once, anywhere;
     the session persists across the whole site (shared localStorage). -->
<div id="auth-bar">
  <span id="auth-status">Checking sign-in…</span>

  <span id="auth-signedout" style="display:none">
    <input id="auth-email" placeholder="email">
    <input id="auth-pass" type="password" placeholder="password">
    <button onclick="authSignIn()">Sign in</button>
    <button onclick="authSignUp()">Create</button>
    <button onclick="authGoogle()">Google</button>
  </span>

  <span class="spacer"></span>

  <span id="auth-signedin" style="display:none">
    <span class="who" id="auth-who"></span>
    <button onclick="authSignOut()">Sign out</button>
  </span>
</div>

<script>
  async function authRefresh() {
    const { data: { session } } = await window.sb.auth.getSession();
    const out = document.getElementById("auth-signedout");
    const inn = document.getElementById("auth-signedin");
    const status = document.getElementById("auth-status");
    if (session) {
      status.textContent = "";
      out.style.display = "none";
      inn.style.display = "inline";
      document.getElementById("auth-who").textContent =
        "Signed in: " + (session.user.user_metadata.full_name || session.user.email);
    } else {
      status.textContent = "Not signed in —";
      out.style.display = "inline";
      inn.style.display = "none";
    }
  }
  async function authSignIn() {
    const { error } = await window.sb.auth.signInWithPassword({
      email: authEmail.value, password: authPass.value });
    if (error) alert(error.message); else location.reload();
  }
  async function authSignUp() {
    const { error } = await window.sb.auth.signUp({
      email: authEmail.value, password: authPass.value });
    alert(error ? error.message : "Account created. Now Sign in.");
  }
  async function authGoogle() {
    await window.sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  }
  async function authSignOut() { await window.sb.auth.signOut(); location.reload(); }
  authRefresh();
</script>
