<!-- Injected into <head> of every page by _quarto.yml -->
<!-- Display + mono fonts used throughout the site and in the chord chart -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script>
  // One shared Supabase client for the whole site. The auth widget and the
  // tracker both reuse window.sb so there's a single session.
  window.sb = window.supabase.createClient(CONFIG.URL, CONFIG.ANON);
</script>
<!-- Session navigation: sets window.TOOL_CONFIG from URL params before any
     tool scripts run; injects a step banner when a session is active. -->
<script src="/apps/shared/session-nav.js"></script>
