<!-- Injected into <head> of every page by _quarto.yml -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/config.js"></script>
<script>
  // One shared Supabase client for the whole site. The auth widget and the
  // tracker both reuse window.sb so there's a single session.
  window.sb = window.supabase.createClient(CONFIG.URL, CONFIG.ANON);
</script>
<style>
  #auth-bar {
    font-family: sans-serif; font-size: 14px;
    background: #f4f6f8; border-bottom: 1px solid #dde;
    padding: 6px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  #auth-bar input { font-size: 14px; padding: 3px 6px; width: 150px; }
  #auth-bar button { font-size: 14px; padding: 3px 8px; cursor: pointer; }
  #auth-bar .who { font-weight: bold; }
  #auth-bar .spacer { flex: 1; }
</style>
