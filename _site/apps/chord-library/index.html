// ===== MUSIC THEORY FUNCTIONS =====
const FLAT_NAMES  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const SHARP_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_PCS   = new Set([0,2,4,5,7,9,11]);
const LETTERS     = ['C','D','E','F','G','A','B'];
const LETTER_IDX  = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};
const LETTER_PC   = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};

function mod12(n) { return ((n % 12) + 12) % 12; }
function getRootOption(pc) { return DATA.rootOptions.find(r => r.pc === mod12(pc)); }
function noteName(pc, useFlats) { return useFlats ? FLAT_NAMES[mod12(pc)] : SHARP_NAMES[mod12(pc)]; }
function accidentalStr(n) { return n > 0 ? '#'.repeat(n) : n < 0 ? 'b'.repeat(-n) : ''; }

function parseNote(str) {
  const letter = str.charAt(0);
  if (!LETTER_IDX.hasOwnProperty(letter)) return null;
  const acc = str.slice(1).split('').reduce((n, c) => c === '#' ? n + 1 : c === 'b' ? n - 1 : n, 0);
  return { letter, accidental: acc, name: letter + accidentalStr(acc), pc: mod12(LETTER_PC[letter] + acc) };
}

function accidentalWeight(n) {
  const t = Math.abs(n);
  return t <= 1 ? t : t * t + 1;
}

function parseDegree(str) {
  const m = /^([b#]*)(\d+)$/.exec(str || '');
  if (!m) return null;
  const acc = m[1].split('').reduce((n, c) => n + (c === '#' ? 1 : -1), 0);
  return { accidental: acc, degree: Number(m[2]), label: str };
}

function spellNotesForItem(rootNote, item, rootPc) {
  const formula = item.formula.trim().split(/\s+/);
  const rootLetterIdx = LETTER_IDX[rootNote.letter];
  return item.intervals.map((interval, i) => {
    const parsed = parseDegree(formula[i]);
    const degree = parsed ? parsed.degree : i + 1;
    const letter = LETTERS[(rootLetterIdx + degree - 1) % LETTERS.length];
    const pc = mod12(rootPc + interval);
    let acc = mod12(pc - LETTER_PC[letter]);
    if (acc > 6) acc -= 12;
    return {
      degree: parsed ? parsed.label : String(degree),
      interval, pc,
      name: letter + accidentalStr(acc),
      isRoot: mod12(interval) === 0,
      accidental: acc
    };
  });
}

function uniqueArray(arr) { return [...new Set(arr)]; }

function bestSpelling(rootPc, item) {
  const opt = getRootOption(rootPc);
  const aliases = uniqueArray(
    (opt && opt.aliases && opt.aliases.length ? opt.aliases : [noteName(rootPc, false), noteName(rootPc, true)])
  ).map(a => parseNote(a)).filter(p => p && p.pc === mod12(rootPc));
  if (!aliases.length) return parseNote(noteName(rootPc, false));
  return aliases.map(a => {
    const notes = spellNotesForItem(a, item, rootPc);
    const noteScore = notes.reduce((s, t) => s + accidentalWeight(t.accidental), 0);
    const aliasScore = 0.25 * accidentalWeight(a.accidental);
    const canonicalScore = 0.05 * (a.name !== (opt ? opt.canonical : '') ? 1 : 0);
    return { ...a, score: noteScore + aliasScore + canonicalScore };
  }).sort((a, b) => a.score - b.score)[0];
}

function spellItemNotes(rootPc, item) {
  return spellNotesForItem(bestSpelling(rootPc, item), item, rootPc)
    .map(({ accidental, ...rest }) => rest);
}

function noteNamesByPitchClass(rootPc, item) {
  return spellItemNotes(rootPc, item).reduce((map, t) => {
    if (!map[mod12(t.pc)]) map[mod12(t.pc)] = t.name;
    return map;
  }, {});
}

function isWhiteKey(pc) { return WHITE_PCS.has(mod12(pc)); }

function previousWhiteMidi(midi) {
  let m = midi;
  while (!isWhiteKey(m)) m--;
  return m;
}

function nextWhiteMidi(midi) {
  let m = midi;
  while (!isWhiteKey(m)) m++;
  return m;
}

function listWhiteMidis(start, end) {
  const list = [];
  for (let i = start; i <= end; i++) if (isWhiteKey(i)) list.push(i);
  return list;
}

function preferFlats(rootPc) {
  const opt = getRootOption(rootPc);
  return !!(opt && opt.canonical.includes('b'));
}

function getChord(id) {
  for (const g of DATA.chordGroups) {
    const item = g.items.find(i => i.id === id);
    if (item) return item;
  }
  return DATA.chordGroups[0].items[0];
}

function getScale(id) {
  for (const g of DATA.scaleGroups) {
    const item = g.items.find(i => i.id === id);
    if (item) return item;
  }
  return DATA.scaleGroups[0].items[0];
}

function chordPitchClasses(rootPc, chord) {
  return uniqueArray(chord.intervals.map(i => mod12(rootPc + i)));
}

function essentialChordPitchClasses(rootPc, chord) {
  const list = [];
  function addGroup(pcs) {
    pcs.forEach(pc => { if (chord.intervals.includes(pc)) list.push(pc); });
  }
  list.push(0);
  addGroup([2,3,4,5,6,8]);
  addGroup([9,10,11]);
  chord.intervals.filter(i => i > 11).forEach(i => list.push(mod12(i)));
  addGroup([7]);
  return uniqueArray(list.map(pc => mod12(rootPc + pc)));
}

function scalePitchClasses(rootPc, scale) {
  return uniqueArray(scale.intervals.map(i => mod12(rootPc + i)));
}

function buildChordMidis(rootPc, chord, inversion) {
  const base = 60 + mod12(rootPc);
  const midis = [...chord.intervals.map(i => base + i)];
  for (let i = 0; i < inversion; i++) {
    if (midis.length) midis.push(midis.shift() + 12);
  }
  return midis;
}

function buildChordTones(rootPc, chord, inversion) {
  const base = 60 + mod12(rootPc);
  const names = spellItemNotes(rootPc, chord);
  const tones = [...chord.intervals.map((interval, i) => ({ ...names[i], midi: base + interval }))];
  for (let i = 0; i < inversion; i++) {
    if (tones.length) {
      const t = tones.shift();
      tones.push({ ...t, midi: t.midi + 12 });
    }
  }
  return tones;
}

function buildScaleMidis(rootPc, scale) {
  const base = 60 + mod12(rootPc);
  return [...scale.intervals.map(i => base + i), base + 12];
}

function buildScaleTones(rootPc, scale) {
  const base = 60 + mod12(rootPc);
  const names = spellItemNotes(rootPc, scale);
  const tones = scale.intervals.map((interval, i) => ({ ...names[i], midi: base + interval }));
  const octave = { ...tones[0], degree: '8', midi: base + 12 };
  return [...tones, octave];
}

function chordDisplayName(rootPc, chord) {
  const spelling = bestSpelling(rootPc, chord);
  const name = spelling ? spelling.name : noteName(rootPc, false);
  return chord.symbol ? name + chord.symbol : name;
}

function scaleDisplayName(rootPc, scale) {
  const spelling = bestSpelling(rootPc, scale);
  const name = spelling ? spelling.name : noteName(rootPc, false);
  return name + ' ' + scale.label;
}

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

// ===== FRETBOARD LOGIC =====

function findBarres(strings) {
  const fretted = strings.map((e, i) => ({ entry: e, idx: i })).filter(x => x.entry && x.entry.fret !== null && x.entry.fret > 0);
  if (!fretted.length) return [];
  const barres = [];
  const minFret = Math.min(...fretted.map(x => x.entry.fret));
  const firstIdx = strings.findIndex(s => s && s.fret === minFret);
  let lastIdx = -1;
  for (let i = strings.length - 1; i >= 0; i--) {
    if (strings[i] && strings[i].fret === minFret) { lastIdx = i; break; }
  }
  if (firstIdx !== -1 && lastIdx > firstIdx) {
    let isBarre = true;
    for (let i = firstIdx; i <= lastIdx; i++) {
      const s = strings[i];
      if (!s || s.fret === null || s.fret < minFret) { isBarre = false; break; }
    }
    if (isBarre) barres.push({ fret: minFret, startString: firstIdx, endString: lastIdx, type: 'main' });
  }
  uniqueArray(fretted.map(x => x.entry.fret)).sort((a, b) => a - b).forEach(fret => {
    if (fret === minFret) return;
    const indices = fretted.filter(x => x.entry.fret === fret).map(x => x.idx).sort((a, b) => a - b);
    let start = -1, prev = -2;
    indices.forEach((idx, i) => {
      if (start === -1) { start = idx; }
      else if (idx !== prev + 1) {
        if (prev - start + 1 >= 3) barres.push({ fret, startString: start, endString: prev, type: 'partial' });
        start = idx;
      }
      prev = idx;
      if (i === indices.length - 1 && prev - start + 1 >= 3) {
        barres.push({ fret, startString: start, endString: prev, type: 'partial' });
      }
    });
  });
  return barres;
}

function buildScaleMarkers(tuning, pitchClasses, rootPc, startFret, fretCount) {
  const end = startFret + fretCount - 1;
  const markers = [];
  let rootCount = 0;
  tuning.strings.forEach((str, si) => {
    for (let f = 0; f <= end; f++) {
      if (startFret !== 0 && f < startFret) continue;
      const pc = mod12(str.openMidi + f);
      if (pitchClasses.includes(pc)) {
        const marker = { stringIndex: si, fret: f, pc, midi: str.openMidi + f, isRoot: pc === rootPc };
        if (marker.isRoot) rootCount++;
        markers.push(marker);
      }
    }
  });
  return { markers, rootCount };
}

function generateScalePositions(tuning, pitchClasses, rootPc, fretCount) {
  const positions = [];
  for (let start = 0; start <= 12; start++) {
    const result = buildScaleMarkers(tuning, pitchClasses, rootPc, start, fretCount);
    if (result.rootCount > 0 && result.markers.length >= tuning.strings.length) {
      positions.push({ startFret: start, fretCount, markers: result.markers });
    }
  }
  return positions;
}

function isGuitarStandardOpenChord(tuning, rootPc, chord) {
  if (!tuning || tuning.id !== 'guitar-standard' || !chord) return false;
  const openRoots = { major:[0,2,4,7,9], minor:[2,4,9], '7':[0,2,4,7,9], maj7:[0,4,7,9], m7:[2,4,9],
    sus2:[0,2,4,7,9], sus4:[0,2,4,7,9], add9:[0,2,7,9] }[chord.id];
  return !!(openRoots && openRoots.includes(mod12(rootPc)));
}

function generateChordPositions(tuning, allPcs, essentialPcs, rootPc, chordItem) {
  const results = [];
  const seen = new Set();

  for (let startFret = 0; startFret <= 12; startFret++) {
    const pos = findBestPositionAtFret(startFret, tuning, allPcs, essentialPcs, rootPc, chordItem);
    if (pos) {
      const key = pos.strings.map(s => s.fret === null ? 'x' : s.fret).join('-');
      if (seen.has(key)) continue;
      seen.add(key);
      results.push(pos);
    }
  }
  return results;
}

function findBestPositionAtFret(startFret, tuning, allPcs, essentialPcs, rootPc, chordItem) {
  const maxFret = startFret === 0 ? 4 : startFret + 4;
  // For each string, build list of valid fret choices
  const choices = tuning.strings.map(str => {
    const opts = [{ fret: null, muted: true }];
    for (let f = 0; f <= maxFret; f++) {
      if (startFret !== 0 && f < startFret) continue;
      const pc = mod12(str.openMidi + f);
      if (allPcs.includes(pc)) {
        opts.push({ fret: f, pc, midi: str.openMidi + f, isRoot: pc === rootPc });
      }
    }
    return opts;
  });

  let best = null;
  const current = [];

  function search(strIdx) {
    if (strIdx === choices.length) {
      const score = scorePosition(current, startFret, essentialPcs, rootPc, tuning, chordItem);
      if (score === -Infinity) return;
      if (!best || score > best.score) {
        best = {
          startFret, fretCount: 5,
          strings: current.map(s => s ? { ...s } : { fret: null, muted: true }),
          barres: findBarres(current),
          score
        };
      }
      return;
    }
    for (const opt of choices[strIdx]) {
      current.push(opt);
      search(strIdx + 1);
      current.pop();
    }
  }
  search(0);
  return best;
}

function scorePosition(strings, startFret, essentialPcs, rootPc, tuning, chordItem) {
  const fretted = strings.filter(s => s && s.fret !== null);
  const mutedCount = strings.length - fretted.length;
  const pcs = uniqueArray(fretted.map(s => s.pc));
  const aboveOpen = fretted.filter(s => s.fret > 0);
  const openCount = fretted.filter(s => s.fret === 0).length;
  const lowestFretted = fretted[0] || null;

  let firstIdx = strings.findIndex(s => s && s.fret !== null);
  let lastIdx = -1;
  for (let i = strings.length - 1; i >= 0; i--) {
    if (strings[i] && strings[i].fret !== null) { lastIdx = i; break; }
  }
  const gapCount = (firstIdx === -1 || lastIdx === -1) ? 0
    : strings.slice(firstIdx, lastIdx + 1).filter(s => !s || s.fret === null).length;

  const fretNums = aboveOpen.map(s => s.fret);
  const uniqueFrets = uniqueArray(fretNums);
  const maxFret = fretNums.length ? Math.max(...fretNums) : 0;
  const minFret = fretNums.length ? Math.min(...fretNums) : 0;
  const fretSpan = aboveOpen.length ? maxFret - minFret : 0;

  const barres = findBarres(strings);
  const mainBarre = barres.find(b => b.type === 'main') || null;
  const partialBarres = barres.filter(b => b.type === 'partial');

  // Validity
  if (fretted.length < Math.min(3, essentialPcs.length)) return -Infinity;
  if (pcs.length < Math.min(3, essentialPcs.length)) return -Infinity;
  if (!fretted.some(s => s.isRoot)) return -Infinity;
  if (!essentialPcs.every(pc => pcs.includes(pc))) return -Infinity;
  if (fretSpan > 4) return -Infinity;

  let score = 0
    + 12 * pcs.length
    + 3 * fretted.length
    + 2.5 * essentialPcs.length
    + openCount * (startFret === 0 ? 3.5 : 0.5)
    - 1.5 * mutedCount
    - 6 * gapCount
    - 3 * startFret;

  if (lowestFretted && lowestFretted.isRoot) score += 8;
  else if (lowestFretted) score -= 16;

  if (fretted.some(s => s.fret === 0)) score += 2;

  if (fretted.some(s => s.pc === mod12(rootPc + 4)) || fretted.some(s => s.pc === mod12(rootPc + 3))) {
    score += 1.5;
  }

  // Bonus for common open guitar chord shapes
  if (isGuitarStandardOpenChord(tuning, rootPc, chordItem) && startFret === 0 && openCount > 0 && maxFret <= 3) {
    score += 24;
  }

  if (openCount > 0 && maxFret > 3) score -= 16;
  if (openCount > 0 && uniqueFrets.length >= 3) score -= 10;
  if (openCount > 0 && maxFret > 0 && maxFret - minFret >= 3) score -= 4;

  if (mainBarre) {
    score += 6 + (mainBarre.endString - mainBarre.startString + 1) * 1.4;
    if (openCount === 0) score += 4;
  }

  if (partialBarres.length) {
    score += partialBarres.reduce((s, b) => s + (b.endString - b.startString + 1) * 0.6, 0);
  }

  if (openCount === 0 && lowestFretted && lowestFretted.isRoot && firstIdx >= 0 && firstIdx <= 1) score += 4;
  if (openCount === 0 && uniqueFrets.length <= 3) score += 2;

  return score;
}

// ===== SVG RENDERING =====
const SVG_NS = 'http://www.w3.org/2000/svg';
const COLORS = {
  page:'#ffffff', line:'#333333', softLine:'#000000', border:'#b3b3b3',
  active:'#ffffff', root:'#c6c6c6', rootText:'#1f1f1f', blackKey:'#1a1a1a',
  label:'#1f1f1f', board:'#ffffff'
};

function createSvg(w, h, viewBox) {
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.setAttribute('viewBox', viewBox || `0 0 ${w} ${h}`);
  svg.setAttribute('role', 'img');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  return svg;
}

function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, String(v)));
  return el;
}

function svgText(parent, text, x, y, opts) {
  const attrs = {
    x, y,
    'font-size': opts['font-size'] || 12,
    'font-weight': opts['font-weight'] || 600,
    fill: opts.fill || COLORS.label,
    'text-anchor': opts['text-anchor'] || 'middle',
    'font-family': opts['font-family'] || 'ui-sans-serif, system-ui, sans-serif'
  };
  ['dominant-baseline','letter-spacing','lengthAdjust','textLength'].forEach(k => {
    if (opts[k] !== undefined) attrs[k] = opts[k];
  });
  const el = svgEl('text', attrs);
  el.textContent = text;
  parent.appendChild(el);
  return el;
}

function svgNoteLabel(parent, text, x, y, opts) {
  const multi = text.length > 1;
  svgText(parent, text, x, y, {
    ...opts,
    'dominant-baseline': 'middle',
    'font-weight': 800,
    'letter-spacing': multi ? '-0.7' : '0',
    lengthAdjust: multi ? 'spacingAndGlyphs' : undefined,
    textLength: multi ? opts.maxTextLength : undefined
  });
}

function svgDiagramTitle(parent, title, width) {
  svgText(parent, title, width / 2, 23, { 'font-size': 15.5, 'font-weight': 700, fill: COLORS.label });
}

function svgBackground(parent, w, h) {
  parent.appendChild(svgEl('rect', { x: 0, y: 0, width: w, height: h, fill: COLORS.page }));
}

function markerColors(isRoot) {
  return isRoot
    ? { fill: COLORS.root, stroke: COLORS.line, text: COLORS.rootText }
    : { fill: COLORS.active, stroke: COLORS.line, text: COLORS.label };
}

// Keyboard range selection (matches original algorithm)
const BARRE_START_PCS = new Set([0, 5]); // C and F
const BARRE_END_PCS   = new Set([4, 11]); // E and B

function selectKeyboardRange(midis) {
  const lo = Math.min(...midis), hi = Math.max(...midis);
  const startBase = previousWhiteMidi(lo);
  const endBase   = nextWhiteMidi(hi);
  const candidates = [];

  for (let s = previousWhiteMidi(startBase); s >= startBase - 24; s--) {
    if (!isWhiteKey(s) || !BARRE_START_PCS.has(mod12(s))) continue;
    for (let e = nextWhiteMidi(endBase); e <= endBase + 24; e++) {
      if (!isWhiteKey(e) || !BARRE_END_PCS.has(mod12(e))) continue;
      const whites = listWhiteMidis(s, e);
      if (whites.length < 7) continue;
      if (![0,2,4,5,7,9,11].every(pc => whites.some(m => mod12(m) === pc))) continue;
      candidates.push({ startMidi: s, endMidi: e, whites,
        score: 100 * whites.length + Math.abs((s + e) / 2 - (lo + hi) / 2) });
    }
  }

  if (candidates.length) return candidates.sort((a, b) => a.score - b.score)[0];

  let s = startBase, e = endBase;
  let whites = listWhiteMidis(s, e);
  while (whites.length < 7) {
    s = previousWhiteMidi(s - 1);
    whites = listWhiteMidis(s, e);
    if (whites.length < 7) {
      e = nextWhiteMidi(e + 1);
      whites = listWhiteMidis(s, e);
    }
  }
  return { startMidi: s, endMidi: e, whites };
}

function renderKeyboard({ midis, tones, rootPc, useFlats, title, exportName }) {
  const tonesMap = new Map((tones || []).map(t => [t.midi, t]));
  const nameMap  = new Map((tones || midis.map(m => ({ midi: m }))).map(t => [t.midi, t.name]));
  const activeSet = new Set(midis);
  const { startMidi, endMidi, whites } = selectKeyboardRange(midis);
  const w = 42 * whites.length + 16;
  const svg = createSvg(w, 208);
  svg.dataset.exportName = exportName;
  svg.appendChild(svgEl('title')).textContent = title;
  svgBackground(svg, w, 208);
  svgDiagramTitle(svg, title, w);

  const whitePositions = new Map();
  whites.forEach((midi, idx) => {
    const x = 8 + 42 * idx;
    whitePositions.set(midi, x);
    const active = activeSet.has(midi);
    const tone = (tones || []).find(t => t.midi === midi);
    const colors = markerColors(tone ? tone.isRoot : false);
    svg.appendChild(svgEl('rect', { x, y: 44, width: 42, height: 146, fill: COLORS.page, stroke: COLORS.line, 'stroke-width': 1.2 }));
    if (active) {
      svg.appendChild(svgEl('circle', { cx: x + 21, cy: 176, r: 11, fill: colors.fill, stroke: colors.stroke, 'stroke-width': 1.2 }));
      svgNoteLabel(svg, nameMap.get(midi) || noteName(midi, useFlats), x + 21, 176.5,
        { 'font-size': 13, maxTextLength: 17, fill: colors.text });
    }
  });

  // Black keys
  for (let midi = startMidi; midi <= endMidi; midi++) {
    if (isWhiteKey(midi)) continue;
    const lo = previousWhiteMidi(midi - 1);
    const hi = nextWhiteMidi(midi + 1);
    const xLo = whitePositions.get(lo);
    if (xLo === undefined || !whitePositions.has(hi)) continue;
    const bx = xLo + 42 - 13;
    const active = activeSet.has(midi);
    const tone = (tones || []).find(t => t.midi === midi);
    const colors = markerColors(tone ? tone.isRoot : false);
    svg.appendChild(svgEl('rect', { x: bx, y: 44, width: 26, height: 84, fill: COLORS.blackKey, stroke: COLORS.line, 'stroke-width': 1.2 }));
    if (active) {
      svg.appendChild(svgEl('circle', { cx: bx + 13, cy: 109, r: 8.5, fill: colors.fill, stroke: colors.stroke, 'stroke-width': 1.1 }));
      svgNoteLabel(svg, nameMap.get(midi) || noteName(midi, useFlats), bx + 13, 109.5,
        { 'font-size': 10, maxTextLength: 13, fill: colors.text });
    }
  }
  return svg;
}

function renderChordFretboard({ tuning, useFlats, position, startFret, fretCount, rootPc, noteNamesByPc, title, exportName, hideMutedIndicators }) {
  const numStrings = tuning.strings.length;
  const boardW = numStrings > 5 ? 330 : 292;
  const innerW = boardW - 84;
  const strSpacing = numStrings > 1 ? innerW / (numStrings - 1) : innerW;
  const fretSpacing = 306 / fretCount;
  const dotR = Math.min(22.2, strSpacing / 2 - 2.2, fretSpacing / 2 - 2.4);
  const dotRS = Math.min(17.5, dotR, 18);
  const labelSize = 0.92 * dotR;
  const labelMaxLen = 1.5 * dotR;
  const labelSizeS = 0.92 * dotRS;
  const labelMaxLenS = 1.5 * dotRS;

  const svg = createSvg(boardW, 444);
  svg.dataset.exportName = exportName;
  svg.appendChild(svgEl('title')).textContent = title;
  svgBackground(svg, boardW, 444);
  svgDiagramTitle(svg, title, boardW);

  svg.appendChild(svgEl('rect', { x: 42, y: 84, width: innerW, height: 306, fill: COLORS.board, stroke: COLORS.border }));

  // Strings (vertical lines)
  for (let s = 0; s < numStrings; s++) {
    const x = 42 + s * strSpacing;
    svg.appendChild(svgEl('line', { x1: x, y1: 84, x2: x, y2: 390, stroke: COLORS.line, 'stroke-width': 1.3 }));
    svgText(svg, tuning.strings[s].label, x, 410, { 'font-size': 17, fill: COLORS.softLine });
  }

  // Frets (horizontal lines)
  for (let f = 0; f <= fretCount; f++) {
    const y = 84 + f * fretSpacing;
    svg.appendChild(svgEl('line', { x1: 42, y1: y, x2: 42 + innerW, y2: y, stroke: COLORS.line,
      'stroke-width': f === 0 && startFret === 0 ? 5 : 1.6 }));
  }

  if (startFret > 0) {
    svgText(svg, `${startFret}fr`, 18, 84 + 0.7 * fretSpacing, { 'font-size': 11, fill: COLORS.softLine });
  }

  // Barres
  (position.barres || []).forEach(barre => {
    const relFret = startFret === 0 ? barre.fret : barre.fret - startFret + 1;
    if (relFret <= 0 || relFret > fretCount) return;
    const bx = 42 + barre.startString * strSpacing;
    const bx2 = 42 + barre.endString * strSpacing;
    svg.appendChild(svgEl('rect', {
      x: bx, y: 84 + relFret * fretSpacing - fretSpacing / 2 - 7,
      width: bx2 - bx, height: 14, rx: 7,
      fill: '#e6e6e6', stroke: COLORS.line, 'stroke-width': 1.1
    }));
  });

  // Note markers
  position.strings.forEach((str, si) => {
    if (!str || str.hidden) return;
    const x = 42 + si * strSpacing;
    if (str.fret === null) {
      if (!hideMutedIndicators) svgText(svg, 'X', x, 67, { 'font-size': 17, 'font-weight': 700, fill: COLORS.label });
      return;
    }
    const isOpen = str.fret === 0 && startFret === 0;
    const relFret = startFret === 0 ? str.fret : str.fret - startFret + 1;
    const cy = isOpen ? 62 : 84 + relFret * fretSpacing - fretSpacing / 2;
    const colors = markerColors(str.isRoot);
    const r = isOpen ? dotRS : dotR;
    svg.appendChild(svgEl('circle', { cx: x, cy, r, fill: colors.fill, stroke: colors.stroke, 'stroke-width': 1.6 }));
    svgNoteLabel(svg, (noteNamesByPc && noteNamesByPc[str.pc]) || noteName(str.pc, useFlats), x, cy + 0.5, {
      'font-size': isOpen ? labelSizeS : labelSize,
      maxTextLength: isOpen ? labelMaxLenS : labelMaxLen,
      fill: colors.text
    });
  });

  return svg;
}

function renderScaleFretboard({ tuning, useFlats, markers, startFret, fretCount, rootPc, noteNamesByPc, title, exportName }) {
  const numStrings = tuning.strings.length;
  const boardH = numStrings > 5 ? 306 : 278;
  const innerH = boardH - 60 - 58;
  const strSpacing = numStrings > 1 ? innerH / (numStrings - 1) : innerH;
  const fretSpacing = 612 / fretCount;
  const dotR = Math.min(16.4, strSpacing / 2 - 2.4, fretSpacing / 2 - 2);
  const labelSize = dotR >= 15 ? 14.4 : 13.8;
  const labelMaxLen = 1.45 * dotR;
  const boardRight = 60 + innerH + 34;

  const svg = createSvg(700, boardH);
  svg.dataset.exportName = exportName;
  svg.dataset.exportScale = '1.35';
  svg.appendChild(svgEl('title')).textContent = title;
  svgBackground(svg, 700, boardH);
  svgDiagramTitle(svg, title, 700);

  svg.appendChild(svgEl('rect', { x: 54, y: 60, width: 612, height: innerH, fill: COLORS.board, stroke: COLORS.border }));

  // Frets (vertical)
  for (let f = 0; f <= fretCount; f++) {
    const x = 54 + f * fretSpacing;
    svg.appendChild(svgEl('line', { x1: x, y1: 60, x2: x, y2: 60 + innerH, stroke: COLORS.line,
      'stroke-width': f === 0 && startFret === 0 ? 4 : 1.4 }));
    if (f < fretCount) {
      svgText(svg, startFret === 0 ? f + 1 : startFret + f, x + fretSpacing / 2, boardRight,
        { 'font-size': 10, fill: COLORS.softLine });
    }
  }

  // Strings (horizontal)
  tuning.strings.forEach((str, si) => {
    const y = 60 + innerH - si * strSpacing;
    svg.appendChild(svgEl('line', { x1: 54, y1: y, x2: 666, y2: y, stroke: COLORS.line, 'stroke-width': 1.2 }));
    svgText(svg, str.label, 688, y + 4, { 'font-size': 17, fill: COLORS.softLine, 'text-anchor': 'end' });
  });

  if (startFret > 0) {
    svgText(svg, `${startFret}fr`, 24, 52, { 'font-size': 11, fill: COLORS.softLine });
  }

  markers.forEach(marker => {
    const relFret = startFret === 0 ? marker.fret : marker.fret - startFret + 1;
    const cx = marker.fret === 0 && startFret === 0 ? 36 : 54 + relFret * fretSpacing - fretSpacing / 2;
    const cy = 60 + innerH - marker.stringIndex * strSpacing;
    const colors = markerColors(marker.isRoot);
    svg.appendChild(svgEl('circle', { cx, cy, r: dotR, fill: colors.fill, stroke: colors.stroke, 'stroke-width': 1.5 }));
    svgNoteLabel(svg, (noteNamesByPc && noteNamesByPc[marker.pc]) || noteName(marker.pc, useFlats), cx, cy + 0.5,
      { 'font-size': labelSize, maxTextLength: labelMaxLen, fill: colors.text });
  });

  return svg;
}

// ===== STATE =====
const DEFAULT_STATE = {
  instrumentId: 'keyboard', mode: 'chord', rootPc: 0,
  chordId: 'major', scaleId: 'major', tuningId: '',
  inversion: 0, showFullNeck: false, bassRootOnly: false,
  fretCount: 7, chordPositionIndex: 0, scalePositionIndex: 0, settingsOpen: false
};

let state = { ...DEFAULT_STATE };
let exportBusy = null;

function getDefaultTuningId(instrument) {
  return instrument && instrument.defaultTuningId
    ? instrument.defaultTuningId
    : (instrument && instrument.tunings && instrument.tunings[0] ? instrument.tunings[0].id : '');
}

function countOpenStrings(position) {
  if (!position || !position.strings) return 0;
  return position.strings.filter(s => s && typeof s.fret === 'number' && s.fret === 0).length;
}

function getMaxFret(position) {
  if (!position || !position.strings) return Infinity;
  const frets = position.strings.filter(s => s && typeof s.fret === 'number' && s.fret >= 0).map(s => s.fret);
  return frets.length ? Math.max(...frets) : Infinity;
}

function patch(updates) {
  Object.assign(state, updates);
  render();
}

// ===== EXPORT HELPERS =====
function downloadFile(blob, filename) {
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function svgToPng(svgEl) {
  const serialized = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const vb = svgEl.viewBox.baseVal;
      const scale = Number(svgEl.dataset.exportScale || '1');
      const dpr = Math.max(4, Math.ceil(2.5 * (window.devicePixelRatio || 1) * scale));
      const canvas = document.createElement('canvas');
      canvas.width = vb.width * dpr; canvas.height = vb.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, vb.width, vb.height);
      ctx.drawImage(img, 0, 0, vb.width, vb.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('PNG export failed')));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('SVG load failed')); };
    img.src = url;
  });
}

function showToast(msg) {
  const el = document.getElementById('feedback-toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

function currentSvg() {
  return document.querySelector('#diagram-stage svg') || null;
}

async function exportSvg() {
  const svg = currentSvg();
  if (!svg || exportBusy) return;
  exportBusy = 'svg';
  document.getElementById('btn-svg').textContent = 'Saving...';
  try {
    const s = new XMLSerializer().serializeToString(svg);
    const b = new Blob([s], { type: 'image/svg+xml;charset=utf-8' });
    downloadFile(b, (svg.dataset.exportName || 'chord-library-diagram') + '.svg');
    showToast('SVG downloaded');
  } catch { showToast('SVG export failed'); }
  finally { exportBusy = null; document.getElementById('btn-svg').textContent = 'SVG'; }
}

async function exportPng() {
  const svg = currentSvg();
  if (!svg || exportBusy) return;
  exportBusy = 'png';
  document.getElementById('btn-png').textContent = 'Exporting...';
  try {
    const b = await svgToPng(svg);
    downloadFile(b, (svg.dataset.exportName || 'chord-library-diagram') + '.png');
    showToast('PNG downloaded');
  } catch { showToast('PNG export failed'); }
  finally { exportBusy = null; document.getElementById('btn-png').textContent = 'PNG'; }
}

async function copyPng() {
  const svg = currentSvg();
  if (!svg || exportBusy) return;
  exportBusy = 'copy';
  document.getElementById('btn-copy').textContent = 'Copying...';
  try {
    const b = await svgToPng(svg);
    if (navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem !== 'undefined') {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': b })]);
      showToast('PNG copied');
    } else {
      downloadFile(b, (svg.dataset.exportName || 'chord-library-diagram') + '.png');
      showToast('PNG downloaded');
    }
  } catch { showToast('Copy failed'); }
  finally { exportBusy = null; document.getElementById('btn-copy').textContent = 'Copy PNG'; }
}

// ===== RENDER =====
function render() {
  const { instrumentId, mode, rootPc, chordId, scaleId, tuningId, inversion,
          showFullNeck, bassRootOnly, fretCount, chordPositionIndex, scalePositionIndex, settingsOpen } = state;

  const instrument = DATA.instruments.find(i => i.id === instrumentId) || null;
  const isKeyboard = instrument && instrument.type === 'keyboard';
  const isBass     = instrument && instrument.id === 'bass';
  const bassRootMode = isBass && mode === 'chord' && bassRootOnly;
  const tuning     = instrument && !isKeyboard
    ? (instrument.tunings.find(t => t.id === tuningId) || instrument.tunings[0] || null)
    : null;

  const item = mode === 'scale' ? getScale(scaleId) : getChord(chordId);
  const useFlats = preferFlats(rootPc);

  // Compute notes for the notes panel
  let noteTones = spellItemNotes(rootPc, item);
  if (bassRootMode) noteTones = noteTones.filter(t => t.isRoot);

  // Max inversions
  const maxInversion = mode === 'chord' ? Math.min(3, Math.max(item.intervals.length - 1, 0)) : 0;
  const inv = clamp(inversion, 0, maxInversion);

  // Compute diagram info
  let diagramState = computeDiagram({ instrument, isKeyboard, isBass, bassRootMode, tuning,
    item, rootPc, useFlats, mode, inv, showFullNeck, fretCount, chordPositionIndex, scalePositionIndex });

  // -- Update selects (only update options when needed) --
  renderInstrumentSelect(instrumentId);
  // mode select: just sync value
  document.getElementById('sel-mode').value = mode;
  // root-label
  document.getElementById('root-label').textContent = mode === 'scale' ? 'Key' : 'Root';
  // root select
  const rootSel = document.getElementById('sel-root');
  if (rootSel.children.length === 0) {
    DATA.rootOptions.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.pc; opt.textContent = r.label;
      rootSel.appendChild(opt);
    });
  }
  rootSel.value = rootPc;

  // Chord quality / Scale selects
  renderGroupedSelect('sel-chord', DATA.chordGroups, chordId);
  renderGroupedSelect('sel-scale', DATA.scaleGroups, scaleId);
  document.getElementById('chord-quality-field').style.display = mode === 'chord' ? '' : 'none';
  document.getElementById('scale-field').style.display = mode === 'scale' ? '' : 'none';

  // Settings panel visibility
  document.getElementById('settings-panel').style.display = settingsOpen ? '' : 'none';
  const btnSettings = document.getElementById('btn-settings');
  if (settingsOpen) {
    btnSettings.classList.add('chord-library-studio_menuButtonActive__72Hc_');
  } else {
    btnSettings.classList.remove('chord-library-studio_menuButtonActive__72Hc_');
  }

  // Tuning
  const tuningField = document.getElementById('tuning-field');
  if (!isKeyboard && tuning) {
    tuningField.style.display = '';
    const tuningSel = document.getElementById('sel-tuning');
    renderSimpleSelect(tuningSel, instrument.tunings.map(t => ({ id: t.id, label: t.name })), tuningId || getDefaultTuningId(instrument));
  } else {
    tuningField.style.display = 'none';
  }

  // Inversion (keyboard + chord mode)
  const invField = document.getElementById('inversion-field');
  if (isKeyboard && mode === 'chord') {
    invField.style.display = '';
    const invSel = document.getElementById('sel-inversion');
    const invLabels = ['Root Position','1st Inversion','2nd Inversion','3rd Inversion'].slice(0, maxInversion + 1);
    renderSimpleSelect(invSel, invLabels.map((l, i) => ({ id: i, label: l })), inv);
  } else {
    invField.style.display = 'none';
  }

  // Bass root only
  const bassField = document.getElementById('bass-root-field');
  bassField.style.display = (!isKeyboard && mode === 'chord' && isBass) ? '' : 'none';
  document.getElementById('chk-bass-root').checked = bassRootOnly;

  // Full neck (scale mode, not keyboard)
  const fullNeckField = document.getElementById('full-neck-field');
  fullNeckField.style.display = (!isKeyboard && mode === 'scale') ? '' : 'none';
  document.getElementById('chk-full-neck').checked = showFullNeck;

  // Fret count (scale mode, not keyboard)
  const fretCountField = document.getElementById('fret-count-field');
  fretCountField.style.display = (!isKeyboard && mode === 'scale') ? '' : 'none';
  document.getElementById('fret-count-display').textContent = fretCount;
  document.getElementById('rng-fret-count').value = fretCount;

  // Diagram header
  document.getElementById('panel-title').textContent = diagramState.panelTitle || 'Diagram';
  document.getElementById('diagram-title').textContent = diagramState.title || 'Diagram';

  // Stage layout class
  const stage = document.getElementById('diagram-stage');
  stage.className = 'chord-library-studio_diagramStage___t1Nm ' + (diagramState.layout || '');

  // Render SVG
  stage.innerHTML = '';
  if (diagramState.empty) {
    const p = document.createElement('p');
    p.className = 'chord-library-studio_emptyState__iYUHt';
    p.textContent = diagramState.empty;
    stage.appendChild(p);
  } else {
    const svg = diagramState.render ? diagramState.render() : null;
    if (svg) {
      stage.appendChild(svg);
    } else {
      const p = document.createElement('p');
      p.className = 'chord-library-studio_emptyState__iYUHt';
      p.textContent = 'Try a different chord, scale, or tuning.';
      stage.appendChild(p);
    }
  }

  // Position controls
  const posCtrl = document.getElementById('position-controls');
  if (!isKeyboard && diagramState.positionHint !== undefined) {
    posCtrl.style.display = '';
    document.getElementById('position-hint').textContent = diagramState.positionHint || '';
    document.getElementById('btn-prev').disabled = !diagramState.canPrevious;
    document.getElementById('btn-next').disabled = !diagramState.canNext;
  } else {
    posCtrl.style.display = 'none';
  }

  // Notes panel
  document.getElementById('notes-formula').textContent = item.formula;

  tbody.innerHTML = '';
  noteTones.forEach(tone => {
    const tr = document.createElement('tr');
    if (tone.isRoot) tr.className = 'chord-library-studio_rootRow__ayXJC';
    tr.innerHTML = `<td>${tone.degree}</td><td>${tone.name}</td>`;
    tbody.appendChild(tr);
  });
}

function computeDiagram({ instrument, isKeyboard, isBass, bassRootMode, tuning,
    item, rootPc, useFlats, mode, inv, showFullNeck, fretCount, chordPositionIndex, scalePositionIndex }) {

  if (!instrument) return { empty: 'Choose an instrument to begin.', title: 'Diagram', layout: '' };
  if (!mode) return { empty: 'Choose chords or scales.', title: 'Diagram', layout: '' };
  if (rootPc === null || rootPc === undefined) {
    return { empty: mode === 'scale' ? 'Choose a key to build the diagram.' : 'Choose a root to build the diagram.', title: 'Diagram', layout: '' };
  }

  const spelling = bestSpelling(rootPc, item);
  const namePart = spelling ? spelling.name : noteName(rootPc, false);
  const exportName = mode === 'scale'
    ? `${namePart}-${item.id}-${instrument.id}`
    : `${namePart}-${item.id}-${instrument.id}`;

  if (isKeyboard) {
    if (mode === 'scale') {
      return {
        title: scaleDisplayName(rootPc, item),
        panelTitle: 'Keyboard',
        layout: 'chord-library-studio_layoutKeyboard__222Od',
        render: () => renderKeyboard({
          midis: buildScaleMidis(rootPc, item),
          tones: buildScaleTones(rootPc, item),
          rootPc, useFlats,
          title: scaleDisplayName(rootPc, item),
          exportName
        })
      };
    } else {
      return {
        title: chordDisplayName(rootPc, item),
        panelTitle: 'Keyboard',
        layout: 'chord-library-studio_layoutKeyboard__222Od',
        render: () => renderKeyboard({
          midis: buildChordMidis(rootPc, item, inv),
          tones: buildChordTones(rootPc, item, inv),
          rootPc, useFlats,
          title: chordDisplayName(rootPc, item),
          exportName
        })
      };
    }
  }

  if (!tuning) return { empty: 'Choose a tuning to build the diagram.', title: 'Diagram', layout: '' };

  if (mode === 'scale') {
    const pcs = scalePitchClasses(rootPc, item);
    const positions = generateScalePositions(tuning, pcs, rootPc, fretCount);
    const posIdx = clamp(scalePositionIndex, 0, Math.max(positions.length - 1, 0));
    const allMarkers = buildScaleMarkers(tuning, pcs, rootPc, 0, fretCount).markers;
    const pos = showFullNeck ? { startFret: 0 } : positions[posIdx];
    const namePcMap = noteNamesByPitchClass(rootPc, item);
    return {
      title: scaleDisplayName(rootPc, item),
      panelTitle: 'Scale Map',
      layout: 'chord-library-studio_layoutHorizontal__Lt2Yl',
      positionHint: showFullNeck ? `Full fretboard - ${fretCount} frets`
        : positions.length ? `Position ${posIdx + 1} of ${positions.length}` : 'No position',
      canPrevious: !showFullNeck && posIdx > 0,
      canNext: !showFullNeck && posIdx < positions.length - 1,
      render: () => (showFullNeck || pos)
        ? renderScaleFretboard({
            tuning, useFlats,
            markers: showFullNeck ? allMarkers : pos.markers,
            startFret: showFullNeck ? 0 : pos.startFret,
            fretCount, rootPc,
            noteNamesByPc: namePcMap,
            title: scaleDisplayName(rootPc, item),
            exportName
          })
        : null
    };
  }

  // Chord mode
  const allPcs  = chordPitchClasses(rootPc, item);
  const essentialPcs = essentialChordPitchClasses(rootPc, item);
  const essCount = essentialPcs.length <= 2 ? essentialPcs.length : Math.min(4, essentialPcs.length);
  const positions = generateChordPositions(tuning, allPcs, essentialPcs.slice(0, essCount), rootPc, item);

  const bestIdx = positions.length
    ? positions.reduce((best, pos, i, arr) => {
        const b = arr[best];
        const scoreDiff = (pos.score || 0) - (b.score || 0);
        if (Math.abs(scoreDiff) > 5) return scoreDiff > 0 ? i : best;
        if ((pos.startFret || 0) !== (b.startFret || 0)) return (pos.startFret || 0) < (b.startFret || 0) ? i : best;
        const openDiff = countOpenStrings(pos) - countOpenStrings(b);
        if (openDiff !== 0) return openDiff > 0 ? i : best;
        const maxDiff = getMaxFret(pos) - getMaxFret(b);
        if (maxDiff !== 0) return maxDiff < 0 ? i : best;
        return scoreDiff > 0 ? i : best;
      }, 0)
    : -1;

  const posIdx = chordPositionIndex < 0 ? bestIdx : clamp(chordPositionIndex, 0, Math.max(positions.length - 1, 0));
  const namePcMap = noteNamesByPitchClass(rootPc, item);

  let chosenPos = positions[posIdx] || null;

  // Bass root-only mode: show only the lowest root note
  if (bassRootMode && chosenPos) {
    const rootStrIdx = chosenPos.strings.reduce((best, s, i, arr) => {
      if (!s || s.fret === null || !s.isRoot) return best;
      if (best === -1) return i;
      const bMidi = typeof arr[best].midi === 'number' ? arr[best].midi : Infinity;
      const cMidi = typeof s.midi === 'number' ? s.midi : Infinity;
      return cMidi < bMidi ? i : best;
    }, -1);
    if (rootStrIdx !== -1) {
      chosenPos = {
        ...chosenPos, barres: [],
        strings: chosenPos.strings.map((s, i) =>
          i === rootStrIdx ? { ...s } : { fret: null, muted: true, hidden: true }
        )
      };
    }
  }

  return {
    title: chordDisplayName(rootPc, item),
    panelTitle: 'Chord Chart',
    layout: 'chord-library-studio_layoutVertical__JNMgD',
    positionHint: positions.length ? `Position ${posIdx + 1} of ${positions.length}` : 'No position',
    canPrevious: posIdx > 0,
    canNext: posIdx < positions.length - 1,
    render: () => chosenPos
      ? renderChordFretboard({
          tuning, useFlats,
          position: chosenPos,
          startFret: chosenPos.startFret,
          fretCount: chosenPos.fretCount,
          rootPc, noteNamesByPc: namePcMap,
          title: chordDisplayName(rootPc, item),
          exportName,
          hideMutedIndicators: bassRootMode
        })
      : null
  };
}

// ===== SELECT HELPERS =====
function renderInstrumentSelect(selectedId) {
  const sel = document.getElementById('sel-instrument');
  if (sel.dataset.populated) { sel.value = selectedId; return; }
  DATA.instruments.forEach(inst => {
    const opt = document.createElement('option');
    opt.value = inst.id; opt.textContent = inst.name;
    sel.appendChild(opt);
  });
  sel.value = selectedId;
  sel.dataset.populated = '1';
}

function renderGroupedSelect(id, groups, selectedId) {
  const sel = document.getElementById(id);
  const key = groups.map(g => g.id).join(',');
  if (sel.dataset.populated !== key) {
    sel.innerHTML = '';
    groups.forEach(g => {
      const og = document.createElement('optgroup');
      og.label = g.label;
      g.items.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.id; opt.textContent = item.label;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
    sel.dataset.populated = key;
  }
  sel.value = selectedId;
}

function renderSimpleSelect(sel, items, selectedId) {
  const key = items.map(i => i.id).join(',');
  if (sel.dataset.populated !== key) {
    sel.innerHTML = '';
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.id; opt.textContent = item.label;
      sel.appendChild(opt);
    });
    sel.dataset.populated = key;
  }
  sel.value = String(selectedId);
}

// ===== EVENT LISTENERS =====
function init() {
  document.getElementById('sel-instrument').addEventListener('change', e => {
    const inst = DATA.instruments.find(i => i.id === e.target.value);
    patch({ instrumentId: e.target.value, tuningId: getDefaultTuningId(inst),
      chordPositionIndex: 0, scalePositionIndex: 0, showFullNeck: false, bassRootOnly: false });
  });

  document.getElementById('sel-mode').addEventListener('change', e => {
    patch({ mode: e.target.value, chordPositionIndex: 0, scalePositionIndex: 0 });
  });

  document.getElementById('sel-root').addEventListener('change', e => {
    patch({ rootPc: Number(e.target.value), chordPositionIndex: 0, scalePositionIndex: 0 });
  });

  document.getElementById('sel-chord').addEventListener('change', e => {
    patch({ chordId: e.target.value, chordPositionIndex: 0 });
  });

  document.getElementById('sel-scale').addEventListener('change', e => {
    patch({ scaleId: e.target.value, scalePositionIndex: 0 });
  });

  document.getElementById('btn-settings').addEventListener('click', () => {
    patch({ settingsOpen: !state.settingsOpen });
  });

  document.getElementById('sel-tuning').addEventListener('change', e => {
    patch({ tuningId: e.target.value, chordPositionIndex: 0, scalePositionIndex: 0 });
  });

  document.getElementById('sel-inversion').addEventListener('change', e => {
    patch({ inversion: Number(e.target.value) });
  });

  document.getElementById('chk-bass-root').addEventListener('change', e => {
    patch({ bassRootOnly: e.target.checked });
  });

  document.getElementById('chk-full-neck').addEventListener('change', e => {
    patch({ showFullNeck: e.target.checked });
  });

  document.getElementById('rng-fret-count').addEventListener('input', e => {
    patch({ fretCount: Number(e.target.value), scalePositionIndex: 0 });
  });

  document.getElementById('btn-prev').addEventListener('click', () => {
    if (state.mode === 'scale') patch({ scalePositionIndex: Math.max(0, state.scalePositionIndex - 1) });
    else patch({ chordPositionIndex: Math.max(0, state.chordPositionIndex - 1) });
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    if (state.mode === 'scale') patch({ scalePositionIndex: state.scalePositionIndex + 1 });
    else patch({ chordPositionIndex: state.chordPositionIndex + 1 });
  });

  document.getElementById('btn-svg').addEventListener('click', exportSvg);
  document.getElementById('btn-png').addEventListener('click', exportPng);
  document.getElementById('btn-copy').addEventListener('click', copyPng);

  window.addEventListener('keydown', e => {
    const tag = document.activeElement && document.activeElement.tagName;
    if (['INPUT','SELECT','TEXTAREA'].includes(tag)) return;
    const svg = currentSvg();
    if (!svg) return;
    const ds = computeDiagram({
      instrument: DATA.instruments.find(i => i.id === state.instrumentId) || null,
      isKeyboard: (DATA.instruments.find(i => i.id === state.instrumentId) || {}).type === 'keyboard',
      isBass: state.instrumentId === 'bass',
      bassRootMode: state.instrumentId === 'bass' && state.mode === 'chord' && state.bassRootOnly,
      tuning: null, item: state.mode === 'scale' ? getScale(state.scaleId) : getChord(state.chordId),
      rootPc: state.rootPc, useFlats: preferFlats(state.rootPc), mode: state.mode,
      inv: state.inversion, showFullNeck: state.showFullNeck, fretCount: state.fretCount,
      chordPositionIndex: state.chordPositionIndex, scalePositionIndex: state.scalePositionIndex
    });
    if (e.key === 'ArrowLeft' && ds.canPrevious) {
      e.preventDefault();
      if (state.mode === 'scale') patch({ scalePositionIndex: Math.max(0, state.scalePositionIndex - 1) });
      else patch({ chordPositionIndex: Math.max(0, state.chordPositionIndex - 1) });
    } else if (e.key === 'ArrowRight' && ds.canNext) {
      e.preventDefault();
      if (state.mode === 'scale') patch({ scalePositionIndex: state.scalePositionIndex + 1 });
      else patch({ chordPositionIndex: state.chordPositionIndex + 1 });
    }
  });

  render();
}

init();
})();
</script>
