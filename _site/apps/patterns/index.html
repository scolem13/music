<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="../shared/abcjs-audio.css">
	<link rel="stylesheet" href="examples-styles.css">
	<title>Multi Pattern</title>
	<style>
		.input, .output {
			display: flex;
			column-gap: 10px;
			margin: 0;
		}
		.output > div {
			width: 100%;
			height: 100%;
		}
		label {
			margin-top: 10px;
			display: block;
		}
		textarea, pre, #warnings {
			display: none;
		}
		.stupid-label {
			margin-right: 5px;
			margin-left: 5px;
		}
		.buddy {
			display: flex;
			margin: 2px 6px;
			padding: 1px;
			text-align: center;
			align-items: center;
			justify-content: center;
		}
		.number-input-label {
			display: inline-block;
			margin: 6px;
		}
		select {
			width: 45px;
			height: 30px;
		}
		input {
			width: 60px;
		}
		.octave-transpose {
			width: 40px;
		}
		.checkbox {
			width: 25px;
			height: 25px;
		}
		div.inflow {
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		#the-bottom {
			position: fixed;
			bottom: 30px;
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
		}
		#more {
			display: none;
			flex-wrap: wrap;
		}
		#audio {
			width: 200px;
			position: fixed;
			bottom: 1vh;
			margin: auto;
		}
		#pattern-selector {
			width: max-content;
		}
		text[font-family*="Times New Roman"] {
			display: none;
		}
		#solfege-display {
			height: 90%;
			width: 100%;
			display: none;
			align-content: flex-start;
			justify-content: center;
			font-weight: bolder;
			font-size: 12vw;
		}
		#selections {
			display: flex;
			margin: 6px 10%;
		}
		.abcjs-midi-clock {
			display: none;
		}
	</style>
	<script>
		const abcList = [];
		let solfegeString = "";
		let currentTune = 0;
		let secondOctave = [0, 0, 0, 0];
		let synthControl;

		function showOptions() {
			const show = document.getElementById("show-options").checked;
			document.getElementById("more").style.display = show ? "flex" : "none";
			document.getElementById("tune-selector").style.display = show ? "block" : "none";
		}

		function showNotes() {
			document.getElementById("main").style.display =
				document.getElementById("show-notes").checked ? "block" : "none";
			paramChanged();
		}

		function showSolfege() {
			document.getElementById("solfege-display").style.display =
				document.getElementById("show-solfege").checked ? "flex" : "none";
		}

		function refreshSongbook() {
			const pattern = document.getElementById("pattern-selector").value;
			abcList.length = 0;
			const abcString = patternObject[pattern];
			const tuneBook = new ABCJS.TuneBook(abcString);
			const selectTune = document.getElementById("tune-selector");
			selectTune.innerHTML = "";
			for (let i = 0; i < tuneBook.tunes.length; i++) {
				const option = document.createElement("option");
				option.textContent = tuneBook.tunes[i].id;
				option.value = i;
				abcList.push(tuneBook.tunes[i].abc);
				selectTune.appendChild(option);
			}
			paramChanged();
		}

		function moveStuff(target, aspect, source) {
			document.getElementById(target).style[aspect] =
				document.getElementById(source).value + "%";
		}

		function nextTune() {
			currentTune = (currentTune + 1) % abcList.length;
			document.getElementById("tune-selector").value = currentTune;
			paramChanged();
		}

		function randomTune() {
			if (abcList.length <= 1) { paramChanged(); return; }
			let tuneIndex;
			do { tuneIndex = Math.floor(Math.random() * abcList.length); }
			while (tuneIndex === currentTune);
			document.getElementById("tune-selector").selectedIndex = tuneIndex;
			currentTune = tuneIndex;
			paramChanged();
		}

		function octaveToChange(i) {
			secondOctave[i] = document.getElementById("second-octave-box" + i).checked;
			paramChanged();
		}

		function octaveAll(n) {
			for (let i = 0; i < 4; i++) {
				const el = document.getElementById("octave-transpose" + i);
				el.value = parseInt(el.value) + n;
			}
			paramChanged();
		}

		function paramChanged(userAction) {
			currentTune = parseInt(document.getElementById("tune-selector").value);
			const semis = parseInt(document.getElementById("vis-transpose").value);
			const octs0 = parseInt(document.getElementById("octave-transpose0").value);
			const octs1 = parseInt(document.getElementById("octave-transpose1").value);
			const octs2 = parseInt(document.getElementById("octave-transpose2").value);
			const octs3 = parseInt(document.getElementById("octave-transpose3").value);

			const renderParams  = { responsive: "resize", selectTypes: false, visualTranspose: 12 + semis + octs0 * 12 };
			const renderParams2 = { responsive: "resize", selectTypes: false, visualTranspose:  2 + semis + octs1 * 12 };
			const renderParams4 = { responsive: "resize", selectTypes: false, visualTranspose:  9 + semis + octs2 * 12 };
			const renderParams3 = { responsive: "resize", selectTypes: false, visualTranspose: -12 + semis + octs3 * 12 };

			let tune = abcList[currentTune];
			solfegeString = "";
			for (const line of tune.split("\n")) {
				if (line.startsWith("w: "))      solfegeString = line.slice(3);
				else if (line.startsWith("w:")) solfegeString = line.slice(2);
			}
			document.getElementById("solfege-display").innerHTML = solfegeString;

			const tuneLines = tune.split("\n");
			tuneLines[0] += "\n%%MIDI program 4 ";
			tuneLines[0] += "\nM:none";
			tuneLines[0] += "\n%%staffwidth 100";
			tuneLines[0] += "\n%%score (V1 V2)";
			tune = tuneLines.join("\n");

			function octaver(t, index) {
				if (!secondOctave[index]) {
					const lines = t.split("\n");
					lines.pop(); lines.pop();
					return lines.join("\n");
				}
				return t;
			}

			const visualObj = ABCJS.renderAbc("paper0", octaver(tune, 0), renderParams)[0];
			ABCJS.renderAbc("paper1", octaver(tune, 1), renderParams2);
			const tuneBass = tune.split("\n");
			tuneBass[0] += "\nK: clef=bass";
			ABCJS.renderAbc("paper2", octaver(tuneBass.join("\n"), 2), renderParams3);
			ABCJS.renderAbc("paper3", octaver(tune, 3), renderParams4);

			createSynth(visualObj, { midiTranspose: semis });
		}

		function createSynth(visualObj, synthOpts) {
			synthControl = new ABCJS.synth.SynthController();
			synthControl.load("#audio", null, {
				displayRestart: true, displayPlay: true, displayProgress: true
			});
			new ABCJS.synth.CreateSynth().init({
				visualObj: visualObj,
				options: { soundFontUrl: "https://paulrosen.github.io/midi-js-soundfonts/MusyngKite/" }
			}).then(function() {
				synthControl.setTune(visualObj, true, synthOpts)
					.catch(function(error) { console.warn("Audio problem:", error); });
			}).catch(function(error) { console.warn("Audio problem:", error); });
		}
	</script>
</head>
<body>
	<div class="container">
		<main id="main">
			<section class="input">
				<div></div>
				<div><pre id="transposed"></pre></div>
			</section>
			<div id="warnings"></div>
			<section class="output">
				<div><div id="paper0"></div></div>
				<div><div id="paper1"></div></div>
			</section>
			<section class="output">
				<div><div id="paper2"></div></div>
				<div><div id="paper3"></div></div>
			</section>
		</main>
	</div>
	<p id="solfege-display">Do Re Mi</p>
	<div class="inflow">
		<div id="the-bottom" class="the-bottom">
			<div id="audio"></div>
			<div id="selections" class="buddy">
				<div class="buddy"></div>
				<button type="button" onclick="nextTune()">Next</button>
				<button type="button" onclick="randomTune()">Random</button>
				<select id="pattern-selector" onchange="refreshSongbook(); paramChanged()"></select>
				<select id="tune-selector" onchange="paramChanged()"></select>
				<div class="buddy">
					<label class="bottom-label">Opts?</label>
					<input type="checkbox" id="show-options" class="checkbox" onchange="showOptions()">
				</div>
				<div class="buddy">
					<label class="notes-label">Notes?</label>
					<input type="checkbox" checked id="show-notes" class="checkbox" onchange="showNotes()">
				</div>
				<div class="buddy">
					<label class="solfege-label">Solfege?</label>
					<input type="checkbox" id="show-solfege" class="checkbox" onchange="showSolfege()">
				</div>
			</div>
			<div id="more" class="buddy more">
				<label for="key-select" class="number-input-label">Key: </label>
				<select id="key-select" onchange="document.getElementById('vis-transpose').value=this.value; paramChanged();">
					<option value="0">C</option><option value="1">Db</option><option value="2">D</option>
					<option value="3">Eb</option><option value="4">E</option><option value="5">F</option>
					<option value="6">Gb</option><option value="7">G</option><option value="8">Ab</option>
					<option value="9">A</option><option value="10">Bb</option><option value="11">B</option>
				</select>
				<label for="vis-transpose" class="number-input-label">Semitones: </label>
				<input id="vis-transpose" class="number-input" value="0" type="number" min="-12" max="12" oninput="paramChanged()">
				<div class="buddy">
					<label for="octave-transpose" class="number-input-label">Octaves: </label>
					<button type="button" onclick="octaveAll(-1)">-</button>
					<input id="octave-transpose0" class="number-input octave-transpose" value="0" type="number" min="-2" max="2" oninput="paramChanged()">
					<input id="octave-transpose1" class="number-input octave-transpose" value="0" type="number" min="-2" max="2" oninput="paramChanged()">
					<input id="octave-transpose3" class="number-input octave-transpose" value="0" type="number" min="-2" max="2" oninput="paramChanged()">
					<input id="octave-transpose2" class="number-input octave-transpose" value="0" type="number" min="-2" max="2" oninput="paramChanged()">
					<button type="button" onclick="octaveAll(1)">+</button>
				</div>
				<div class="buddy">
					<label for="paper0-top" class="number-input-label">Top: </label>
					<input id="paper0-top" class="trial" value="-12" type="number" oninput="moveStuff('paper0', 'marginTop', 'paper0-top')">
					<input id="paper1-top" class="trial" value="-12" type="number" oninput="moveStuff('paper1', 'marginTop', 'paper1-top')">
					<input id="paper2-top" class="trial" value="5"   type="number" oninput="moveStuff('paper2', 'marginTop', 'paper2-top')">
					<input id="paper3-top" class="trial" value="-3"  type="number" oninput="moveStuff('paper3', 'marginTop', 'paper3-top')">
				</div>
				<div class="buddy">
					<p class="stupid-label">Oct 2? </p>
					<input id="second-octave-box0" class="checkbox" type="checkbox" onchange="octaveToChange(0)">
					<input id="second-octave-box1" class="checkbox" type="checkbox" onchange="octaveToChange(1)">
					<input id="second-octave-box2" class="checkbox" type="checkbox" onchange="octaveToChange(2)">
					<input id="second-octave-box3" class="checkbox" type="checkbox" onchange="octaveToChange(3)">
				</div>
			</div>
		</div>
	</div>
	<script src="../shared/abcjs-basic.js"></script>
	<script src="pattern-object.js"></script>
	<script src="../shared/tonality.js"></script>
	<script src="../shared/audio.js"></script>
	<script src="../shared/establish-button.js"></script>
	<script>
		// Key dropdown = the tonal center (resting tone). Patterns are written with
		// tonic = C, so transpose = resting pitch class. Consumes the shared tonality
		// (set by the tunes); local key picks just transpose the display.
		(function(){
			if (!window.Tonality) return;
			var MINOR = /^(m|min|minor|aeo|aeolian|dor|dorian|phr|phrygian|loc|locrian)$/;
			var CP = { "major-stepwise":"minor-stepwise","minor-stepwise":"major-stepwise",
			           "major-I-V":"minor-i-V","minor-i-V":"major-I-V" };
			function applyT(){
				var r = Tonality.getResting(); if (r == null) return;
				var mode = Tonality.getMode();
				var ps = document.getElementById("pattern-selector");
				var wantMinor = !!(mode && MINOR.test(mode));
				if (ps && CP[ps.value] && wantMinor !== /^minor/.test(ps.value)){
					ps.value = CP[ps.value];
					if (typeof refreshSongbook === "function") refreshSongbook();
				}
				document.getElementById("key-select").value = String(r);
				document.getElementById("vis-transpose").value = String(r);
				if (typeof paramChanged === "function") paramChanged();
			}
			Tonality.onChange(function(st, src){ if (src !== "local") applyT(); });
			window.addEventListener("load", applyT);
		})();
	</script>
	<script>
		// Populate pattern selector, then initialize
		const selectPattern = document.getElementById("pattern-selector");
		for (const key in patternObject) {
			const option = document.createElement("option");
			option.textContent = key;
			option.value = key;
			selectPattern.appendChild(option);
		}
		refreshSongbook();
		for (let i = 0; i < 4; i++) {
			moveStuff("paper" + i, "marginTop", "paper" + i + "-top");
		}
	</script>
</body>
</html>
