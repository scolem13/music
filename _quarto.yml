format:
  html:
    theme: [cosmo, custom.css]
    toc: true
    # Load Supabase + your config in <head>, on every page:
    include-in-header:
      - _includes/head.html
    # Auth: injects sign-in controls into the navbar dropdown:
    include-before-body:
      - _includes/auth-widget.html
    # The page-time + action tracker, on every page:
    include-after-body:
      - _includes/track.html
