project:
  type: website
  # Files that must be copied to the output as-is (not rendered):
  resources:
    - config.js
    - track.js
    - apps/**

website:
  title: "Music Practice (demo)"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Lessons
        menu:
          - lessons/quarter-notes.qmd
          - lessons/dotted-rhythms.qmd
          - lessons/tonal-do-re-mi.qmd
      - text: Practice
        menu:
          - practice/assessment-tune.qmd
          - practice/reading-benchmarks.qmd
          - practice/patterns.qmd
          - practice/rhythms.qmd
          - practice/assessment.qmd
          - practice/assessment-rhythm.qmd
      - text: Tools
        menu:
          - tools/scales.qmd
          - tools/fretboard.qmd
          - tools/circle-of-fifths.qmd
          - tools/keyboard.qmd
          - tools/director.qmd
          - tools/chord-sheet.qmd
          - tools/chord-sheet-deluxe.qmd
          - tools/drumset.qmd
          - tools/solfege-keyboard.qmd
          - tools/accomp-styles.qmd
      - href: teacher/report.qmd
        text: Teacher Report

format:
  html:
    theme: [cosmo, custom.css]
    toc: true
    # Load Supabase + your config in <head>, on every page:
    include-in-header:
      - _includes/head.html
    # A sign-in / status bar at the top of every page:
    include-before-body:
      - _includes/auth-widget.html
    # The page-time + action tracker, on every page:
    include-after-body:
      - _includes/track.html
